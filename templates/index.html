<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>RespAI - رفع صورة الأشعة</title>
    <style>
        body { font-family: Arial, sans-serif; direction: rtl; text-align: center; padding: 50px; }
        h1 { color: #333; }
        form { margin-top: 30px; }
        input[type="file"] { padding: 10px; }
        button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        img { margin-top: 20px; width: 150px; }
    </style>
</head>
<body>
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
    <h1>رفع صورة الأشعة لتوليد التقرير</h1>
    <form action="/" method="POST" enctype="multipart/form-data">
        <input type="file" name="xray_image" accept="image/*" required>
        <br><br>
        <button type="submit">توليد التقرير PDF</button>
    </form>
</body>
</html>
